<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yu(r) Room Design</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root{
  --bg:#F7F5F2;--surface:#fff;--border:#E8E4DF;--border-strong:#C8C4BF;
  --text:#1A1A1A;--muted:#888880;--faint:#B8B4AF;
  --accent:#0F6E56;--accent-l:#E1F5EE;--accent-d:#085041;
  --amber:#F7EED5;--amber-t:#8B6914;--gray:#F4F4F4;--gray-t:#666660;
  --danger:#E24B4A;--font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --r:10px;--rs:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

/* AUTH */
#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}
.auth-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);padding:2.5rem;text-align:center;max-width:340px;width:100%}
.auth-logo{font-size:22px;font-weight:300;letter-spacing:.08em;margin-bottom:.4rem}
.auth-sub{font-size:11px;color:var(--muted);margin-bottom:2rem;letter-spacing:.08em;text-transform:uppercase}
.auth-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:11px 20px;background:var(--text);color:#fff;border:none;border-radius:var(--rs);font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer;transition:opacity .15s}
.auth-btn:hover{opacity:.85}
.auth-btn img{width:18px;height:18px}

/* LAYOUT */
#app{display:none;min-height:100vh}
.sidebar{width:210px;height:100vh;position:fixed;left:0;top:0;background:var(--surface);border-right:0.5px solid var(--border);display:flex;flex-direction:column;padding:1.25rem 0;z-index:50}
.sidebar-logo{padding:0 1.25rem 1rem;border-bottom:0.5px solid var(--border);margin-bottom:.5rem}
.logo-text{font-size:14px;font-weight:400;letter-spacing:.06em}
.logo-sub{font-size:10px;color:var(--muted);margin-top:2px;letter-spacing:.04em}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 1.25rem;font-size:13px;color:var(--muted);cursor:pointer;border-left:2px solid transparent;transition:all .12s}
.nav-item:hover{color:var(--text);background:var(--bg)}
.nav-item.active{color:#8B6914;border-left-color:#C4963A;background:#F7EED5;font-weight:500}
.nav-item i{font-size:16px}
.sidebar-bottom{padding:1rem 1.25rem;border-top:0.5px solid var(--border);margin-top:auto}
.u-row{display:flex;align-items:center;gap:8px}
.u-av{width:28px;height:28px;border-radius:50%;background:var(--accent-l);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:var(--accent-d);overflow:hidden;flex-shrink:0}
.u-av img{width:100%;height:100%;object-fit:cover}
.u-name{font-size:12px;font-weight:500}
.u-email{font-size:11px;color:var(--muted)}
.logout-btn{margin-top:6px;background:none;border:none;font-family:var(--font);font-size:11px;color:var(--faint);cursor:pointer;padding:0}
.logout-btn:hover{color:var(--danger)}

.main{margin-left:210px;padding:1.5rem 2rem;min-height:100vh}
.page{display:none}
.page.active{display:block}
.page-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:10px}
.page-title{font-size:18px;font-weight:500}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:var(--rs);font-family:var(--font);font-size:13px;cursor:pointer;border:0.5px solid var(--border-strong);background:none;color:var(--muted);transition:all .12s}
.btn:hover{background:var(--bg);color:var(--text)}
.btn.primary{background:var(--text);color:#fff;border-color:transparent}
.btn.primary:hover{opacity:.85}
.btn.sm{padding:3px 8px;font-size:11px}
.btn.danger{color:var(--danger);border-color:var(--danger)}
.btn.danger:hover{background:#fff0f0}
.btn.ghost{border:none;padding:4px 6px;color:var(--faint)}
.btn.ghost:hover{color:var(--text);background:var(--border)}

/* BOARD */
.board-wrap{overflow-x:auto;padding-bottom:1rem}
.board{display:flex;gap:10px;min-width:max-content}
.col{width:168px;flex-shrink:0;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);padding:10px;min-height:280px}
.col.drag-over{border-color:var(--accent);background:var(--accent-l)}
.col-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.col-title{font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
.col-count{font-size:10px;background:var(--bg);border:0.5px solid var(--border);border-radius:10px;padding:1px 6px;color:var(--faint)}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--rs);padding:9px;margin-bottom:6px;cursor:grab;transition:border-color .12s}
.card:hover{border-color:var(--border-strong)}
.card:active{cursor:grabbing;opacity:.5}
.card-client{font-size:12px;font-weight:500;margin-bottom:1px}
.card-project{font-size:11px;color:var(--muted);margin-bottom:6px;line-height:1.4}
.card-footer{display:flex;align-items:center;justify-content:space-between;gap:4px}
.cat-pill{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500;white-space:nowrap}
.cat-brand{background:#E1F5EE;color:#085041}.cat-pack{background:#FAECE7;color:#712B13}
.cat-graphic{background:#E6F1FB;color:#0C447C}.cat-social{background:#FBEAF0;color:#72243E}
.cat-digital{background:#FAEEDA;color:#633806}.cat-other{background:#F1EFE8;color:#444441}
.card-amount{font-size:10px;color:var(--faint);font-family:var(--mono)}
.card-date{font-size:10px;color:var(--faint);margin-top:3px;display:flex;align-items:center;gap:3px}
.card-btns{display:flex;gap:2px;margin-top:6px;border-top:0.5px solid var(--border);padding-top:6px}
.col-empty{text-align:center;padding:16px 0;font-size:11px;color:var(--faint)}

/* ARCHIVE */
.archive-section{margin-top:2rem}
.archive-title{font-size:12px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;padding-bottom:6px;border-bottom:0.5px solid var(--border)}
.archive-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.archive-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--rs);padding:10px;font-size:12px}
.archive-client{font-weight:500;margin-bottom:2px}
.archive-project{color:var(--muted);margin-bottom:6px;font-size:11px}
.archive-meta{display:flex;justify-content:space-between;align-items:center}

/* SOP */
.sop-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sop-item{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);overflow:hidden}
.sop-head{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--surface);border-bottom:0.5px solid var(--border)}
.sop-num{width:24px;height:24px;border-radius:50%;background:var(--text);color:#fff;font-size:11px;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sop-stage-name{font-size:13px;font-weight:500}
.sop-body{padding:10px 14px;background:var(--bg)}
.sop-tasks{list-style:none}
.sop-tasks li{display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:0.5px solid var(--border);font-size:12px;color:var(--muted);line-height:1.5}
.sop-tasks li:last-child{border-bottom:none}
.sop-tasks li i{color:var(--faint);flex-shrink:0;margin-top:1px;font-size:14px}

/* TEMPLATES */
.tmpl-section{margin-top:1.5rem}
.tmpl-title{font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.tmpl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.tmpl-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);padding:1rem}
.tmpl-label{font-size:11px;font-weight:500;color:var(--accent);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.tmpl-text{font-size:12px;color:var(--text);line-height:1.75;white-space:pre-wrap;background:var(--bg);border-radius:var(--rs);padding:10px;border:0.5px solid var(--border)}
.tmpl-copy{margin-top:8px}

/* DB */
.db-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.db-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);padding:1rem;display:flex;align-items:flex-start;gap:10px;transition:border-color .12s;text-decoration:none;color:inherit}
.db-card:hover{border-color:var(--accent);background:var(--accent-l)}
.db-icon{width:36px;height:36px;border-radius:var(--rs);background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.db-name{font-size:13px;font-weight:500;margin-bottom:2px}
.db-url{font-size:11px;color:var(--muted)}
.db-add{background:none;border:0.5px dashed var(--border-strong);border-radius:var(--r);padding:1rem;display:flex;align-items:center;justify-content:center;gap:8px;font-size:13px;color:var(--muted);cursor:pointer;font-family:var(--font);transition:all .12s}
.db-add:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-l)}

/* FINANCE */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:1.25rem}
.stat-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);padding:1rem 1.25rem}
.stat-label{font-size:11px;color:var(--muted);margin-bottom:6px}
.stat-value{font-size:22px;font-weight:500;font-family:var(--mono)}
.stat-value.green{color:var(--accent)}
.fin-section-title{font-size:11px;font-weight:500;letter-spacing:.06em;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
.fin-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:0.5px solid var(--border);font-size:13px}
.fin-row:last-child{border-bottom:none}
.pay-table{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);overflow:hidden}
.pay-row{display:grid;grid-template-columns:180px 1fr 110px 100px 110px;gap:0;align-items:stretch;border-bottom:0.5px solid var(--border);font-size:12px}
.pay-row:last-child{border-bottom:none}
.pay-row.header{background:var(--text);color:#fff;font-size:11px;font-weight:500;letter-spacing:.04em}
.pay-cell{padding:9px 12px;display:flex;align-items:center}
.pay-cell.right{justify-content:flex-end;font-family:var(--mono)}
.pay-cell.center{justify-content:center}
.status-pill{display:inline-block;padding:2px 9px;border-radius:10px;font-size:11px;font-weight:500;white-space:nowrap}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;align-items:center;justify-content:center;padding:1rem}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border-radius:var(--r);padding:1.5rem;width:min(500px,100%);max-height:90vh;overflow-y:auto;border:0.5px solid var(--border)}
.modal-title{font-size:15px;font-weight:500;margin-bottom:1.25rem}
.field{margin-bottom:.75rem}
.field label{display:block;font-size:11px;color:var(--muted);margin-bottom:3px;letter-spacing:.04em}
.field input,.field select,.field textarea{width:100%;font-family:var(--font);font-size:13px;border:0.5px solid var(--border-strong);border-radius:var(--rs);padding:8px 10px;background:var(--surface);color:var(--text)}
.field textarea{resize:vertical;min-height:65px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;border-top:0.5px solid var(--border);padding-top:1rem}
.field-group-label{font-size:11px;font-weight:500;color:var(--accent);letter-spacing:.06em;text-transform:uppercase;margin:1rem 0 .5rem;padding-bottom:4px;border-bottom:0.5px solid var(--border)}

/* RESPONSIVE */
@media(max-width:768px){
  .sidebar{width:100%;height:auto;position:fixed;bottom:0;top:auto;flex-direction:row;padding:0;border-right:none;border-top:0.5px solid var(--border);z-index:100}
  .sidebar-logo,.sidebar-bottom{display:none}
  .sidebar nav{display:flex;overflow-x:auto}
  .nav-item{flex-direction:column;gap:2px;padding:10px 12px;font-size:9px;border-left:none;border-top:2px solid transparent;white-space:nowrap}
  .nav-item.active{border-left:none;border-top-color:var(--accent)}
  .main{margin-left:0;margin-bottom:60px;padding:1rem}
  .sop-grid{grid-template-columns:1fr}
  .pay-row{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">Yu(r) Room</div>
    <div class="auth-sub">Design Studio</div>
    <button class="auth-btn" onclick="signIn()">
      <img src="https://www.google.com/favicon.ico" alt="">
      使用 Google 帳號登入
    </button>
  </div>
</div>

<div id="app">
  <div class="sidebar">
    <div class="sidebar-logo" style="padding:1rem 1.25rem 0.875rem;cursor:pointer" onclick="document.getElementById('logo-input').click()" title="點擊更換 Logo">
      <div id="logo-display" style="margin-bottom:4px">
        <img id="logo-img" src="" alt="" style="display:none;max-height:36px;max-width:140px;object-fit:contain">
        <div id="logo-text-fallback">
          <div class="logo-text">Yu(r) Room</div>
          <div class="logo-sub">Design Studio</div>
        </div>
      </div>
      <input type="file" id="logo-input" accept="image/*" style="display:none" onchange="uploadLogo(this)">
    </div>
    <nav>
      <div class="nav-item active" onclick="showPage('board',this)"><i class="ti ti-layout-kanban"></i>看板</div>
      <div class="nav-item" onclick="showPage('sop',this)"><i class="ti ti-checklist"></i>接案 SOP</div>
      <div class="nav-item" onclick="showPage('finance',this)" id="nav-finance"><i class="ti ti-chart-pie"></i>財務總覽</div>
      <div class="nav-item" onclick="showPage('db',this)"><i class="ti ti-database"></i>資料庫</div>
    </nav>
    <div class="sidebar-bottom">
      <div class="u-row">
        <div class="u-av" id="u-av"></div>
        <div><div class="u-name" id="u-name">—</div><div class="u-email" id="u-email">—</div></div>
      </div>
      <button class="logout-btn" onclick="signOut()">登出</button>
    </div>
  </div>

  <main class="main">

    <!-- 看板 -->
    <div class="page active" id="page-board">
      <div class="page-hd">
        <div class="page-title">專案看板</div>
        <button class="btn primary" onclick="openNew()"><i class="ti ti-plus"></i> 新增案件</button>
      </div>
      <div class="board-wrap"><div class="board" id="board"></div></div>
      <div class="archive-section">
        <div class="archive-title">結案紀錄 <span id="archive-count" style="font-weight:400;color:var(--faint)"></span></div>
        <div class="archive-list" id="archive-list"></div>
      </div>
    </div>

    <!-- SOP -->
    <div class="page" id="page-sop">
      <div class="page-hd"><div class="page-title">接案 SOP</div></div>
      <div class="sop-grid" id="sop-grid"></div>

      <div class="tmpl-section">
        <div class="tmpl-title">回覆模板</div>
        <div class="tmpl-grid" id="tmpl-grid"></div>
      </div>
    </div>

    <!-- 財務 -->
    <div class="page" id="page-finance">
      <div class="page-hd">
        <div class="page-title">財務總覽</div>
        <div style="display:flex;gap:8px">
          <a href="https://docs.google.com/spreadsheets/d/1h5VxrPjWBu_2O-VQlWi-YMOiF9mf9yTIY9pHopNRBE0/edit" target="_blank" class="btn sm"><i class="ti ti-external-link"></i> 開啟 Sheets</a>
          <button class="btn sm" onclick="clearCalCache()" title="讓所有已填日期重新同步到Google日曆"><i class="ti ti-calendar-x"></i> 清除日曆快取</button>
          <button class="btn" onclick="loadFinance()"><i class="ti ti-refresh"></i> 更新</button>
        </div>
      </div>
      <div class="stats" id="stats"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:1.5rem">
        <div><div class="fin-section-title">服務分類</div><div id="cat-breakdown" style="background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);padding:0 12px"></div></div>
        <div><div class="fin-section-title">月份收款（已付款）</div><div id="monthly-breakdown" style="background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);padding:0 12px"></div></div>
      </div>
      <div class="fin-section-title">收款紀錄</div>
      <div class="pay-table" id="payment-list"></div>
    </div>

    <!-- 資料庫 -->
    <div class="page" id="page-db">
      <div class="page-hd">
        <div class="page-title">資料庫</div>
        <button class="btn primary" onclick="openAddDb()"><i class="ti ti-plus"></i> 新增連結</button>
      </div>
      <div class="db-grid" id="db-grid"></div>
    </div>

  </main>
</div>

<!-- 新增/編輯案件 Modal -->
<div class="modal-bg" id="modal-card">
  <div class="modal">
    <div class="modal-title" id="modal-title">新增案件</div>
    <input type="hidden" id="f-id">
    <div class="field-row">
      <div class="field"><label>客戶名稱 *</label><input id="f-client" placeholder="瑿働身體顧問有限公司"></div>
      <div class="field"><label>聯絡方式</label><input id="f-contact" placeholder="Line / Email"></div>
    </div>
    <div class="field"><label>案件名稱 *</label><input id="f-project" placeholder="視覺識別系統設計"></div>
    <div class="field-row">
      <div class="field"><label>服務類別</label>
        <select id="f-cat">
          <option value="brand">品牌識別 Branding</option>
          <option value="pack">包裝設計 Packaging</option>
          <option value="graphic">視覺與平面 Graphic</option>
          <option value="social">社群視覺 Social</option>
          <option value="digital">數位與動態 Digital</option>
          <option value="other">其他 Other</option>
        </select>
      </div>
      <div class="field"><label>專案總金額</label><input id="f-amount" type="number" placeholder="55000"></div>
    </div>
    <div class="field"><label>目前階段</label>
      <select id="f-stage">
        <option value="0">詢問中</option><option value="1">報價寄出</option>
        <option value="2">訂金到帳</option><option value="3">設計中</option>
        <option value="4">提案</option><option value="5">修改中</option>
        <option value="6">完稿</option><option value="7">結案</option>
      </select>
    </div>
    <div class="field-group-label">排程日期</div>
    <div class="field-row">
      <div class="field"><label>期望完成日</label><input id="f-deadline" type="date"></div>
      <div class="field"><label>第一次提案日</label><input id="f-proposal" type="date"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>第一期款收款日</label><input id="f-dep1" type="date"></div>
      <div class="field"><label>第二期款收款日</label><input id="f-dep2" type="date"></div>
    </div>
    <div class="field"><label>實際交稿日</label><input id="f-delivery" type="date"></div>
    <div class="field"><label>備註</label><textarea id="f-note" placeholder="特殊需求、溝通紀錄..."></textarea></div>
    <div class="modal-btns">
      <button class="btn" onclick="closeModal('modal-card')">取消</button>
      <button class="btn danger" id="btn-del" style="display:none" onclick="deleteCard()">刪除</button>
      <button class="btn primary" onclick="saveCard()">儲存</button>
    </div>
  </div>
</div>

<!-- 新增資料庫連結 Modal -->
<div class="modal-bg" id="modal-db">
  <div class="modal">
    <div class="modal-title">新增資料庫連結</div>
    <input type="hidden" id="db-id">
    <div class="field"><label>名稱</label><input id="db-name" placeholder="收支表"></div>
    <div class="field"><label>網址</label><input id="db-url" placeholder="https://..."></div>
    <div class="field"><label>圖示（emoji）</label><input id="db-icon" placeholder="📊" maxlength="2"></div>
    <div class="field"><label>備註</label><input id="db-note" placeholder="說明這個連結是什麼"></div>
    <div class="modal-btns">

// ── CALENDAR ──────────────────────────────────────────────
// calendarCreated 存的是 {key: eventId}
function maybeAddCalendar(p, field){
  if(!accessToken){ return; }
  const key=`${p.id}_${field}`;
  const dateMap={deadline:p.deadline, proposal:p.proposal, dep1:p.dep1, dep2:p.dep2, delivery:p.delivery};
  const labelMap={deadline:'期望完成', proposal:'第一次提案', dep1:'第一期款收款', dep2:'第二期款收款', delivery:'實際交稿'};
  const colorMap={deadline:'5', proposal:'7', dep1:'2', dep2:'2', delivery:'1'};
  const dateStr=dateMap[field];
  if(!dateStr) return;

  const event={
    summary:`${p.client} — ${labelMap[field]}`,
    description:`案件：${p.project}\n${p.note||''}`,
    start:{date:dateStr}, end:{date:dateStr},
    colorId:colorMap[field]||'5',
  };

  const existingEventId=calendarCreated[key];

  if(existingEventId){
    // 已存在 → PATCH 更新日期
    fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events/${existingEventId}`,{
      method:'PATCH',
      headers:{Authorization:'Bearer '+accessToken,'Content-Type':'application/json'},
      body:JSON.stringify({start:{date:dateStr},end:{date:dateStr},summary:event.summary}),
    }).then(r=>r.json()).then(ev=>{
      if(ev.id) console.log('日曆：已更新',ev.summary,dateStr);
      else { console.log('日曆：更新失敗，重新建立',ev); delete calendarCreated[key]; maybeAddCalendar(p,field); }
    });
  } else {
    // 不存在 → POST 新建
    fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events',{
      method:'POST',
      headers:{Authorization:'Bearer '+accessToken,'Content-Type':'application/json'},
      body:JSON.stringify(event),
    }).then(r=>r.json()).then(ev=>{
      if(ev.id){
        calendarCreated[key]=ev.id;
        localStorage.setItem('yurroom_cal',JSON.stringify(calendarCreated));
        console.log('日曆：已建立',ev.summary,dateStr);
      } else {
        console.log('日曆：建立失敗',ev);
      }
    }).catch(e=>console.log('日曆錯誤：',e));
  }
}

function clearCalCache(){
  calendarCreated={};
  localStorage.removeItem('yurroom_cal');

function saveCard(){
  const client=document.getElementById('f-client').value.trim();
  const project=document.getElementById('f-project').value.trim();
  if(!client||!project){alert('請填入客戶名稱和案件名稱');return;}
  const oldP=editId?projects.find(x=>x.id===editId):null;
  const data={
    id:editId||(Date.now().toString(36)+Math.random().toString(36).slice(2,5)),
    client,project,
    contact:document.getElementById('f-contact').value,
    cat:document.getElementById('f-cat').value,
    amount:document.getElementById('f-amount').value,
    stage:parseInt(document.getElementById('f-stage').value),
    deadline:document.getElementById('f-deadline').value,
    proposal:document.getElementById('f-proposal').value,
    dep1:document.getElementById('f-dep1').value,
    dep2:document.getElementById('f-dep2').value,
    delivery:document.getElementById('f-delivery').value,
    note:document.getElementById('f-note').value,
  };

  // 日曆：所有有值且跟原本不同的日期欄位都觸發
  const dateFields=['deadline','proposal','dep1','dep2','delivery'];
  dateFields.forEach(f=>{
    const newVal=data[f]||'';
    const oldVal=oldP?.[f]||'';
    if(newVal && newVal!==oldVal){
      console.log('觸發日曆：',f,newVal);
      maybeAddCalendar(data,f);
    }
  });

  // Sheets 同步：判斷單次付清
  const dep1New=data.dep1||'', dep2New=data.dep2||'';
  const dep1Old=oldP?.dep1||'', dep2Old=oldP?.dep2||'';
  const isSingle=dep1New && dep2New && dep1New===dep2New;
  if(isSingle && dep1New!==dep1Old){
    syncPayment(data,'single');
  } else {
    if(dep1New && dep1New!==dep1Old) syncPayment(data,'dep1');
    if(dep2New && dep2New!==dep2Old) syncPayment(data,'dep2');
  }

  if(editId) projects=projects.map(p=>p.id===editId?data:p);
  else projects.push(data);

  save();closeModal('modal-card');renderBoard();renderStats();
}

  if(!editId||!confirm('確定刪除？'))return;
  projects=projects.filter(p=>p.id!==editId);

function syncPayment(p, depField){
  if(!accessToken) return;
  const total=Number(p.amount)||0;
  const catName=CAT_MAP[p.cat]||'其他 Other';
  const status='✦ 已付款 ✦';

  let rowData;
  if(depField==='single'){
    // 單次付清：同一天，一筆全額
    rowData=[[p.client,p.project,catName,total,total,'單次付清',p.dep1,status,'']];
  } else if(depField==='dep1'){
    const half=Math.round(total*0.5);
    rowData=[[p.client,p.project,catName,total,half,'第一期款',p.dep1,status,'']];
  } else {
    const half=Math.round(total*0.5);
    rowData=[['','','','',half,'第二期款',p.dep2,status,'']];
  }

  const url=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/收款紀錄!A:I:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS`;
  fetch(url,{
    method:'POST',
    headers:{Authorization:'Bearer '+accessToken,'Content-Type':'application/json'},
    body:JSON.stringify({values:rowData}),
  }).then(r=>r.json()).then(d=>console.log('Sheets 已新增：',depField,d.updates)).catch(e=>console.log('Sheets 錯誤：',e));
}

            <button class="btn sm tmpl-copy" style="margin-top:8px" onclick="copyTmpl(this,${t._idx})"><i class="ti ti-copy"></i> 複製</button>
          </div>`).join('')}
      </div>
    </div>`).join('');
}

function copyTmpl(btn, idx){
  const text=TEMPLATES[idx]?.text||'';
  navigator.clipboard.writeText(text).then(()=>{
    btn.innerHTML='<i class="ti ti-check"></i> 已複製！';
    setTimeout(()=>btn.innerHTML='<i class="ti ti-copy"></i> 複製',2000);
  }).catch(()=>{
    // fallback for older browsers
    const ta=document.createElement('textarea');
    ta.value=text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    btn.innerHTML='<i class="ti ti-check"></i> 已複製！';
    setTimeout(()=>btn.innerHTML='<i class="ti ti-copy"></i> 複製',2000);
  });
}

// ── DB ────────────────────────────────────────────────────
function renderDB(){
  document.getElementById('db-grid').innerHTML=
    dbItems.map(d=>`
      <div class="db-card" style="position:relative">
        <a href="${d.url}" target="_blank" style="display:flex;align-items:flex-start;gap:10px;flex:1;text-decoration:none;color:inherit">
          <div class="db-icon">${d.icon||'🔗'}</div>
          <div>
            <div class="db-name">${d.name}</div>
            <div class="db-url">${d.note||''}</div>
          </div>
        </a>
        <button class="btn ghost sm" onclick="openEditDb('${d.id}')" title="編輯" style="position:absolute;top:8px;right:8px;padding:2px 5px;opacity:.5" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=.5"><i class="ti ti-pencil"></i></button>
      </div>`).join('')
    +`<button class="db-add" onclick="openAddDb()"><i class="ti ti-plus"></i> 新增連結</button>`;
}
function openAddDb(){editDbId=null;['db-id','db-name','db-url','db-icon','db-note'].forEach(id=>document.getElementById(id).value='');document.getElementById('db-del').style.display='none';document.getElementById('modal-db').classList.add('open')}
function openEditDb(id){const d=dbItems.find(x=>x.id===id);if(!d)return;editDbId=id;document.getElementById('db-id').value=d.id;document.getElementById('db-name').value=d.name||'';document.getElementById('db-url').value=d.url||'';document.getElementById('db-icon').value=d.icon||'';document.getElementById('db-note').value=d.note||'';document.getElementById('db-del').style.display='inline-flex';document.getElementById('modal-db').classList.add('open')}
function saveDb(){const name=document.getElementById('db-name').value.trim();const url=document.getElementById('db-url').value.trim();if(!name||!url){alert('請填入名稱和網址');return;}const data={id:editDbId||(Date.now().toString(36)),name,url,icon:document.getElementById('db-icon').value||'🔗',note:document.getElementById('db-note').value};if(editDbId)dbItems=dbItems.map(d=>d.id===editDbId?data:d);else dbItems.push(data);localStorage.setItem('yurroom_db',JSON.stringify(dbItems));closeModal('modal-db');renderDB()}
function deleteDb(){if(!editDbId||!confirm('確定刪除？'))return;dbItems=dbItems.filter(d=>d.id!==editDbId);localStorage.setItem('yurroom_db',JSON.stringify(dbItems));closeModal('modal-db');renderDB()}

// ── FINANCE ───────────────────────────────────────────────
function renderStats(){
  const active=projects.filter(p=>p.stage<7).length;
  const total=projects.reduce((s,p)=>s+(Number(p.amount)||0),0);
  const done=projects.filter(p=>p.stage===7).length;
  document.getElementById('stats').innerHTML=`
    <div class="stat-card"><div class="stat-label">進行中案件</div><div class="stat-value green">${active}</div></div>
    <div class="stat-card"><div class="stat-label">看板總金額</div><div class="stat-value">$${total.toLocaleString()}</div></div>
    <div class="stat-card"><div class="stat-label">已結案</div><div class="stat-value">${done}</div></div>`;
}

function loadFinance(){
  if(!accessToken){ tokenClient?.requestAccessToken({prompt:''}); return; }
  const base=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values`;
  Promise.all([
    fetch(`${base}/年度總覽!B4:D20`,{headers:{Authorization:'Bearer '+accessToken}}).then(r=>r.json()),
    fetch(`${base}/收款紀錄!A3:I200`,{headers:{Authorization:'Bearer '+accessToken}}).then(r=>r.json()),
    fetch(`${base}/年度總覽!B11:D19`,{headers:{Authorization:'Bearer '+accessToken}}).then(r=>r.json()),
    fetch(`${base}/年度總覽!B22:D33`,{headers:{Authorization:'Bearer '+accessToken}}).then(r=>r.json()),
  ]).then(([summary,payments,cats,months])=>{
    // 如果 token 過期，Google 回傳 401
    if(summary.error?.code===401||summary.error?.code===403){
      tokenClient?.requestAccessToken({prompt:''});
      return;
    }
    renderFinanceSummary(summary.values||[]);
    renderCats(cats.values||[]);
    renderMonths(months.values||[]);
    renderPayments(payments.values||[]);
  }).catch(e=>{console.error(e);});
}

function renderFinanceSummary(rows){
  let ti=0,co=0,pe=0;
  rows.forEach(r=>{
    const l=String(r[0]||'').trim();
    const v=parseFloat(String(r[1]||'').replace(/[^0-9.-]/g,''))||0;
    if(l.includes('今年總接案')) ti=v;
    if(l.includes('已收款合計')) co=v;
    if(l.includes('待收款')) pe=v;
  });
  document.getElementById('stats').innerHTML=`
    <div class="stat-card"><div class="stat-label">今年總接案金額</div><div class="stat-value green">$${ti.toLocaleString()}</div></div>
    <div class="stat-card"><div class="stat-label">已收款</div><div class="stat-value">$${co.toLocaleString()}</div></div>
    <div class="stat-card"><div class="stat-label">待收款</div><div class="stat-value" style="color:var(--amber-t)">$${pe.toLocaleString()}</div></div>`;
}

function renderCats(rows){
  // 過濾：有類別名稱的列都顯示，不管金額是否為 0
  const html=rows.filter(r=>r[0]&&String(r[0]).trim()).map(r=>{
    const amt=parseFloat(String(r[1]||'0').replace(/[^0-9.-]/g,''))||0;
    const pct=String(r[2]||'').trim();
    if(amt===0) return ''; // 金額為 0 的不顯示
    return `<div class="fin-row">
      <span>${String(r[0]).trim()}</span>
      <span style="display:flex;gap:16px;align-items:center">
        <span style="font-size:12px;color:var(--muted)">${pct}</span>
        <span style="font-family:var(--mono);font-weight:500">$${amt.toLocaleString()}</span>
      </span>
    </div>`;
  }).join('');
  document.getElementById('cat-breakdown').innerHTML=html||`<div class="fin-row" style="color:var(--faint)">尚無資料</div>`;
}

function renderMonths(rows){
  const html=rows.filter(r=>r[1]&&parseFloat(String(r[1]).replace(/[^0-9.-]/g,''))>0).map(r=>{
    const amt=parseFloat(String(r[1]).replace(/[^0-9.-]/g,''))||0;
    return `<div class="fin-row"><span>${r[0]}</span><span style="font-family:var(--mono);font-weight:500">$${amt.toLocaleString()}</span></div>`;
  }).join('');
  document.getElementById('monthly-breakdown').innerHTML=html||`<div class="fin-row" style="color:var(--faint)">尚無已付款紀錄</div>`;
}

function renderPayments(rows){
  if(!rows.length){document.getElementById('payment-list').innerHTML=`<div style="padding:1rem;font-size:13px;color:var(--faint);text-align:center">尚無收款紀錄</div>`;return;}
  const STATUS_STYLE={'✦ 已付款 ✦':'background:#F7EED5;color:#8B6914','✳ 待付款 ✳':'background:#F4F4F4;color:#666660'};
  let curClient='',curProject='';
  const rowsHTML=rows.filter(r=>r.some(c=>c&&String(c).trim())).map(r=>{
    const client=String(r[0]||'').trim();
    const project=String(r[1]||'').trim();
    const amount=String(r[4]||'').trim();
    const period=String(r[5]||'').trim();
    const date=String(r[6]||'').trim();
    const status=String(r[7]||'').trim();
    if(client) curClient=client;
    if(project) curProject=project;
    if(!amount&&!period) return '';
    const ss=STATUS_STYLE[status]||'background:#eee;color:#888';
    return `<div class="pay-row">
      <div class="pay-cell" style="flex-direction:column;align-items:flex-start;gap:1px">
        ${client?`<div style="font-weight:500;font-size:13px">${client}</div>`:'<div style="font-size:13px;color:var(--faint)"> </div>'}
        ${project?`<div style="font-size:11px;color:var(--muted)">${project}</div>`:''}
      </div>
      <div class="pay-cell" style="color:var(--muted)">${period}</div>
      <div class="pay-cell right" style="font-weight:500">${amount}</div>
      <div class="pay-cell center" style="font-size:11px;color:var(--faint)">${date}</div>
      <div class="pay-cell center"><span class="status-pill" style="${ss}">${status}</span></div>
    </div>`;
  }).join('');

  document.getElementById('payment-list').innerHTML=`
    <div class="pay-row header">
      <div class="pay-cell">客戶 / 案件</div>
      <div class="pay-cell">期別</div>
      <div class="pay-cell right">金額</div>
      <div class="pay-cell center">日期</div>
      <div class="pay-cell center">狀態</div>
    </div>${rowsHTML}`;
}
